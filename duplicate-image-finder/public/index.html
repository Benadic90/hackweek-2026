<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Image Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Similarity Comparator</h1>
            <p>Upload two images to instantly calculate their visual similarity using perceptual hashing.</p>
        </header>

        <div class="upload-container">
            <!-- First Image Uploader -->
            <div class="upload-box" id="drop-zone-1">
                <div class="upload-content" id="content-1">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <h2>Image 1</h2>
                    <p>Drag & drop or click</p>
                </div>
                <img id="preview-1" class="preview-img hidden" alt="Preview 1">
                <input type="file" id="file-input-1" accept="image/*" hidden>
            </div>

            <div class="vs-badge">VS</div>

            <!-- Second Image Uploader -->
            <div class="upload-box" id="drop-zone-2">
                <div class="upload-content" id="content-2">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <h2>Image 2</h2>
                    <p>Drag & drop or click</p>
                </div>
                <img id="preview-2" class="preview-img hidden" alt="Preview 2">
                <input type="file" id="file-input-2" accept="image/*" hidden>
            </div>
        </div>

        <div class="action-area">
            <button id="compare-btn" class="btn-primary" disabled>Compare Images</button>
            <button id="reset-btn" class="btn-secondary hidden">Start Over</button>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing pixels and generating perceptual hashes...</p>
        </div>

        <div id="results-container" class="hidden">
            <div class="match-card">
                <div class="match-header">
                    <h3>Similarity Score</h3>
                    <span id="similarity-badge" class="badge">0% Similar</span>
                </div>
                <div class="hash-info">
                    <p><strong>Hash 1:</strong> <span id="hash-1-text"></span></p>
                    <p><strong>Hash 2:</strong> <span id="hash-2-text"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
