<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Agent — Control Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="12" r="4"></circle>
        <line x1="21.17" y1="8" x2="12" y2="8"></line>
        <line x1="3.95" y1="6.06" x2="8.54" y2="14"></line>
        <line x1="10.88" y1="21.94" x2="15.46" y2="14"></line>
      </svg>
      <span>BrowserAgent</span>
    </div>
    <span class="status-text" id="status-text">Ready</span>
  </header>

  <main class="container">
    
    <!-- Controls Panel -->
    <section class="controls">
      <h2>Agent Task</h2>
      
      <div class="form-group">
        <label for="task-select">Select a Skill</label>
        <select id="task-select">
          <option value="search">🔍 Google Search</option>
          <option value="screenshot">📸 Full-Page Screenshot</option>
          <option value="extract">📊 Page Data Extractor</option>
          <option value="form">📝 Auto Form Filler</option>
          <option value="wiki">📖 Wikipedia Lookup</option>
        </select>
      </div>

      <div class="form-group" id="input-group">
        <label for="task-input" id="input-label">Search Query</label>
        <input type="text" id="task-input" placeholder="e.g. best programming languages 2026">
      </div>

      <button id="run-btn" class="run-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Run Agent
      </button>

      <p class="hint" id="task-description">The agent will search Google for your query and extract the top results.</p>
    </section>

    <!-- Live Output -->
    <section class="output">
      <div class="output-header">
        <h2>Activity Log</h2>
        <button id="clear-btn" class="clear-btn">Clear</button>
      </div>
      <div class="log-area" id="log-area">
        <p class="log-line system">Agent initialized. Select a task and click "Run Agent".</p>
      </div>
    </section>

    <!-- Results Panel -->
    <section class="results hidden" id="results-section">
      <h2>Results</h2>
      <div id="results-content"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
