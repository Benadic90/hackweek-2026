<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Art Festival - Pikachu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="title">
    <h1>CSS Art Festival</h1>
    <p>Pure HTML & CSS Pikachu - Zero Images, Zero SVGs</p>
  </div>

  <div class="canvas">
    <div class="pikachu">
      <!-- Tail is placed behind everything -->
      <div class="tail-wrapper">
        <div class="tail">
          <div class="t1"></div>
          <div class="t2"></div>
          <div class="t3"></div>
          <div class="t4"></div>
          <div class="t5"></div>
        </div>
      </div>

      <!-- Body -->
      <div class="body-wrapper">
        <div class="arm left"></div>
        <div class="arm right"></div>
        <div class="foot left"></div>
        <div class="foot right"></div>
        <div class="torso">
          <div class="back-stripe top"></div>
          <div class="back-stripe bottom"></div>
        </div>
      </div>

      <!-- Head -->
      <div class="head">
        <!-- Ears -->
        <div class="ear left"></div>
        <div class="ear right"></div>

        <!-- Face -->
        <div class="face">
          <!-- Eyes -->
          <div class="eye left">
            <div class="pupil"></div>
          </div>
          <div class="eye right">
            <div class="pupil"></div>
          </div>

          <!-- Nose -->
          <div class="nose"></div>

          <!-- Mouth -->
          <div class="mouth">
            <div class="lip left"></div>
            <div class="lip right"></div>
            <div class="tongue-wrapper">
              <div class="tongue"></div>
            </div>
          </div>

          <!-- Cheeks -->
          <div class="cheek left">
            <div class="spark"></div>
          </div>
          <div class="cheek right">
            <div class="spark"></div>
          </div>
        </div>
      </div>
      
      <!-- Shadow under Pikachu -->
      <div class="ground-shadow"></div>
    </div>
  </div>

</body>
</html>
