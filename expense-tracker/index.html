<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header class="navbar">
    <div class="container header-container">
      <h1 class="logo">Finance Tracker</h1>
    </div>
  </header>

  <main class="container">
    
    <div class="dashboard-grid">
      <!-- Left Column: Summary & Charts -->
      <div class="dashboard-left">
        
        <div class="summary-cards">
          <div class="card stat-card">
            <span class="stat-title">Total Expenses (This Month)</span>
            <span class="stat-value" id="total-expenses">$0.00</span>
          </div>
          <div class="card stat-card">
            <span class="stat-title">Monthly Budget</span>
            <span class="stat-value" id="monthly-budget-display">$0.00</span>
            <button class="btn btn-sm btn-outline" style="margin-top: 8px;" onclick="setBudget()">Set Budget</button>
          </div>
        </div>

        <div class="card" id="budget-alert" style="display: none; background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; margin-bottom: 20px;">
          <strong>Warning:</strong> You have exceeded your monthly budget!
        </div>

        <div class="card">
          <h3 class="card-title">Expenses by Category</h3>
          <div class="chart-container">
            <canvas id="expenseChart"></canvas>
          </div>
        </div>

      </div>

      <!-- Right Column: Add Expense & History -->
      <div class="dashboard-right">
        
        <div class="card">
          <h3 class="card-title">Add New Expense</h3>
          <form id="expense-form">
            <div class="form-group">
              <label for="desc">Description</label>
              <input type="text" id="desc" class="form-control" placeholder="e.g. Groceries" required>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" class="form-control" step="0.01" min="0" required>
              </div>
              <div class="form-group half">
                <label for="date">Date</label>
                <input type="date" id="date" class="form-control" required>
              </div>
            </div>
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" class="form-control" required>
                <option value="Food & Dining">Food & Dining</option>
                <option value="Transportation">Transportation</option>
                <option value="Housing">Housing</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Shopping">Shopping</option>
                <option value="Utilities">Utilities</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Add Expense</button>
          </form>
        </div>

        <div class="card" style="margin-top: 20px;">
          <h3 class="card-title">Recent Expenses</h3>
          <div class="expense-list" id="expense-list">
            <!-- Expenses will be injected here -->
          </div>
        </div>

      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
