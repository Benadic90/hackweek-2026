<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Business Card Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  
  <!-- Libraries for exporting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <header class="navbar">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
      </svg>
      <span>CardGen</span>
    </div>
  </header>

  <main class="container">
    
    <!-- Editor Panel (Left) -->
    <section class="editor-panel">
      
      <div class="editor-section">
        <h2>1. Choose Template</h2>
        <div class="template-selector">
          <button class="template-btn active" data-theme="theme-minimal">Minimal</button>
          <button class="template-btn" data-theme="theme-dark">Dark Mode</button>
          <button class="template-btn" data-theme="theme-creative">Creative</button>
        </div>
      </div>

      <div class="editor-section">
        <h2>2. Enter Details</h2>
        <form id="details-form" class="details-form">
          
          <div class="form-group">
            <label for="input-name">Full Name</label>
            <input type="text" id="input-name" value="Jane Doe" placeholder="e.g. John Smith">
          </div>
          
          <div class="form-group">
            <label for="input-title">Job Title</label>
            <input type="text" id="input-title" value="Software Engineer" placeholder="e.g. Product Designer">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="input-email">Email</label>
              <input type="email" id="input-email" value="jane@example.com" placeholder="name@domain.com">
            </div>
            <div class="form-group">
              <label for="input-phone">Phone</label>
              <input type="tel" id="input-phone" value="+1 (555) 123-4567" placeholder="+1 ...">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="input-linkedin">LinkedIn</label>
              <input type="text" id="input-linkedin" value="linkedin.com/in/janedoe" placeholder="linkedin.com/in/...">
            </div>
            <div class="form-group">
              <label for="input-github">GitHub / Website</label>
              <input type="text" id="input-github" value="github.com/janedoe" placeholder="github.com/...">
            </div>
          </div>

          <div class="form-group">
            <label for="input-image">Profile Photo</label>
            <input type="file" id="input-image" accept="image/png, image/jpeg, image/webp">
          </div>

        </form>
      </div>

      <div class="editor-section">
        <h2>3. Export</h2>
        <div class="export-buttons">
          <button id="btn-download-img" class="export-btn img-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Save as PNG
          </button>
          <button id="btn-download-pdf" class="export-btn pdf-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Save as PDF
          </button>
        </div>
      </div>

    </section>

    <!-- Preview Panel (Right) -->
    <section class="preview-panel">
      <p class="preview-hint">Live Preview</p>
      
      <!-- The element that actually gets downloaded -->
      <div id="card-capture-area" class="card-capture-area">
        
        <div id="business-card" class="business-card theme-minimal">
          <div class="card-background-accent"></div>
          
          <div class="card-content">
            <div class="card-header">
              <!-- Default placeholder image -->
              <img id="card-image" class="card-image" src="https://ui-avatars.com/api/?name=Jane+Doe&background=e2e8f0&color=64748b&size=128" alt="Profile">
              <div class="card-titles">
                <h1 id="card-name">Jane Doe</h1>
                <h2 id="card-title">Software Engineer</h2>
              </div>
            </div>
            
            <div class="card-contact">
              <div class="contact-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <span id="card-email">jane@example.com</span>
              </div>
              <div class="contact-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <span id="card-phone">+1 (555) 123-4567</span>
              </div>
              <div class="contact-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                <span id="card-linkedin">linkedin.com/in/janedoe</span>
              </div>
              <div class="contact-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                <span id="card-github">github.com/janedoe</span>
              </div>
            </div>
          </div>
          
        </div>
      </div>
      
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
