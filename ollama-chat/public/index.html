<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollama Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          <span>Ollama Chat</span>
        </div>
      </div>

      <div class="sidebar-controls">
        <div class="model-select">
          <label>Model</label>
          <select id="model-select">
            <option value="llama3">llama3</option>
          </select>
        </div>
        <button id="clear-btn" class="clear-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          Clear Chat
        </button>
      </div>

      <div class="sidebar-footer">
        <p>Make sure <strong>Ollama</strong> is running locally before chatting.</p>
      </div>
    </aside>

    <!-- main chat area -->
    <main class="chat-area">
      <div class="chat-messages" id="messages">
        <div class="welcome">
          <div class="welcome-icon">💬</div>
          <h2>Chat with Ollama</h2>
          <p>Start a conversation with your local AI model. Type a message below to begin.</p>
        </div>
      </div>

      <div class="chat-input-wrap">
        <div class="input-container">
          <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
          <button id="send-btn" class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          </button>
        </div>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
